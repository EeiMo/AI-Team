# ============================================================
# 团队即时投票工具 — Nginx 配置
# 版本：v1.1 | 设计人：长夜 | 日期：2026-06-01
# 目标镜像：nginx:1.25-alpine
# ============================================================
#
# 路由表：
#   :80         → 301 HTTPS
#   :443 /      → /usr/share/nginx/html (SPA fallback → index.html)
#   :443 /api/* → app:3001 (反向代理)
#   :443 /ws/*  → app:3001 (WebSocket Upgrade, 粘性会话)
#   :443 /assets/* → /usr/share/nginx/html (静态资源，强缓存)
#
# ============================================================

user  nginx;
worker_processes  auto;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ────────────────────────────────────────────
    # real_ip 模块：从反向代理链提取真实客户端 IP
    # 确保 ip_hash 基于真实 IP 而非 Docker 网关 IP
    # ────────────────────────────────────────────
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ────────────────────────────────────────────
    # 日志格式（含 request_id 用于链路追踪）
    # ────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time '
                    'rid="$http_x_request_id"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    # ────────────────────────────────────────────
    # 性能优化
    # ────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Gzip 压缩
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types      text/plain
                    text/css
                    text/xml
                    text/javascript
                    application/json
                    application/javascript
                    application/xml+rss
                    image/svg+xml;

    # ────────────────────────────────────────────
    # upstream：后端应用集群
    # ip_hash = 同一客户端 IP 始终路由到同一节点
    # real_ip 模块保证 $remote_addr 是真实 IP
    # ────────────────────────────────────────────
    upstream vote_app {
        ip_hash;
        server app:3001 max_fails=3 fail_timeout=30s;
        # 水平扩展时取消注释：
        # server app-2:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ╔═══════════════════════════════════════════╗
    # ║  HTTP (80) — 强制跳转 HTTPS             ║
    # ╚═══════════════════════════════════════════╝
    server {
        listen       80;
        listen       [::]:80;
        server_name  _;

        # 301 永久重定向
        return 301 https://$host$request_uri;
    }

    # ╔═══════════════════════════════════════════╗
    # ║  HTTPS (443) — 主服务                    ║
    # ╚═══════════════════════════════════════════╝
    server {
        listen       443 ssl http2;
        listen       [::]:443 ssl http2;
        server_name  _;

        # ── SSL 证书 ────────────────────────────
        # MVP：自签证书
        #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        #     -keyout certs/privkey.pem -out certs/fullchain.pem
        # 生产：替换为 Let's Encrypt 或云厂商免费证书
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # ── SSL 安全配置 ────────────────────────
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头
        add_header X-Frame-Options         "SAMEORIGIN" always;
        add_header X-Content-Type-Options  "nosniff"    always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # 客户端请求体大小限制
        client_max_body_size 10m;

        # ── 健康检查（不记日志）─────────────────
        location /health {
            access_log off;
            proxy_pass http://vote_app/health;
        }

        # ── 静态资源（强缓存）───────────────────
        location /assets/ {
            root      /usr/share/nginx/html;
            expires   30d;
            add_header Cache-Control "public, immutable";
            # 若请求文件不存在，不 fallback 到 index.html
            try_files $uri =404;
        }

        # ── API 反向代理 ────────────────────────
        location /api/ {
            proxy_pass              http://vote_app;
            proxy_http_version      1.1;
            proxy_set_header        Host                $host;
            proxy_set_header        X-Real-IP           $remote_addr;
            proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto   $scheme;
            proxy_set_header        X-Request-ID        $request_id;

            # 超时
            proxy_connect_timeout   10s;
            proxy_read_timeout      30s;
            proxy_send_timeout      30s;

            # 连接池复用
            proxy_set_header        Connection "";
        }

        # ── WebSocket 反向代理 ──────────────────
        location /ws/ {
            proxy_pass              http://vote_app;
            proxy_http_version      1.1;

            # WebSocket Upgrade 关键头
            proxy_set_header        Upgrade             $http_upgrade;
            proxy_set_header        Connection          "upgrade";
            proxy_set_header        Host                $host;
            proxy_set_header        X-Real-IP           $remote_addr;
            proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto   $scheme;
            proxy_set_header        X-Request-ID        $request_id;

            # 长连接超时（24h）
            proxy_read_timeout      86400s;
            proxy_send_timeout      86400s;

            # 禁用缓冲（WS 实时消息）
            proxy_buffering         off;
        }

        # ── 前端 SPA 入口 ────────────────────────
        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            # SPA fallback：所有未知路由交给 index.html
            try_files $uri $uri/ /index.html;

            # 短期缓存
            expires   1h;
            add_header Cache-Control "public, no-cache";
        }
    }
}
