<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Architecture — 团队即时投票工具</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #94a3b8;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
    --client: #dbeafe;
    --gateway: #e9d5ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #64748b;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
      --client: #1e3a5f;
      --gateway: #4a266a;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    max-width: 1100px;
    margin: 32px auto;
    padding: 0 20px;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 13px; font-weight: 600; fill: var(--fg); }
  .small { font-size: 11px; fill: var(--muted); }
  .tiny { font-size: 10px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1.2; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .client { fill: var(--client); }
  .gateway { fill: var(--gateway); }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.7; }
  .zonelabel { font-size: 11px; font-weight: 600; fill: var(--muted); letter-spacing: 0.5px; }
</style>
<main>
  <svg viewBox="0 0 1050 820" xmlns="http://www.w3.org/2000/svg">

    <!-- ===== connectors drawn first (behind boxes) ===== -->

    <!-- Client → Nginx -->
    <path class="edge" d="M 450,110 L 450,165" marker-end="url(#arrow)" />
    <path class="edge" d="M 750,110 L 750,165" marker-end="url(#arrow)" />

    <!-- Nginx → App -->
    <path class="edge" d="M 600,235 L 600,290" marker-end="url(#arrow)" />

    <!-- App → PG -->
    <path class="edge" d="M 420,510 L 300,590" marker-end="url(#arrow)" />
    <path class="edge" d="M 420,510 L 350,610" marker-end="url(#arrow)" />

    <!-- App → Redis -->
    <path class="edge" d="M 780,510 L 900,590" marker-end="url(#arrow)" />
    <path class="edge" d="M 780,510 L 850,610" marker-end="url(#arrow)" />

    <!-- Nginx → static -->
    <path class="edge" d="M 750,200 L 900,220 L 900,160" marker-end="url(#arrow)" />

    <!-- arrow marker -->
    <defs>
      <marker id="arrow" viewBox="0 0 10 8" refX="8" refY="4" markerWidth="8" markerHeight="6" orient="auto">
        <path d="M 0,0 L 10,4 L 0,8 Z" fill="var(--line)" />
      </marker>
    </defs>

    <!-- ===== zones ===== -->

    <!-- Client zone -->
    <rect class="zone" x="30" y="20" width="990" height="120" rx="8" />
    <text class="zonelabel" x="46" y="38">客户端层 Client Layer</text>

    <!-- Gateway zone -->
    <rect class="zone" x="30" y="155" width="990" height="100" rx="8" />
    <text class="zonelabel" x="46" y="173">接入层 Gateway</text>

    <!-- Application zone -->
    <rect class="zone" x="30" y="270" width="990" height="270" rx="8" />
    <text class="zonelabel" x="46" y="288">应用层 Application</text>

    <!-- Data zone -->
    <rect class="zone" x="30" y="570" width="990" height="160" rx="8" />
    <text class="zonelabel" x="46" y="588">数据层 Data &amp; Cache</text>

    <!-- ===== DIAGRAM TITLE ===== -->
    <text class="title" x="525" y="780" text-anchor="middle">团队即时投票工具 — 系统分层架构</text>

    <!-- ===== Client Layer ===== -->

    <!-- Feishu Desktop -->
    <rect class="node client" x="260" y="48" width="280" height="52" rx="6" />
    <text class="label" x="400" y="68" text-anchor="middle">飞书桌面端 WebView</text>
    <text class="small" x="400" y="86" text-anchor="middle">React SPA + ECharts 5.x + Socket.IO Client</text>

    <!-- Feishu Mobile -->
    <rect class="node client" x="590" y="48" width="280" height="52" rx="6" />
    <text class="label" x="730" y="68" text-anchor="middle">飞书移动端 WebView</text>
    <text class="small" x="730" y="86" text-anchor="middle">响应式 (max-w 640px) + ECharts 按需</text>

    <!-- ===== Gateway Layer ===== -->

    <!-- Nginx -->
    <rect class="node gateway" x="450" y="173" width="240" height="52" rx="6" />
    <text class="label" x="570" y="193" text-anchor="middle">Nginx 1.25</text>
    <text class="small" x="570" y="211" text-anchor="middle">反向代理 · WS Upgrade · ip_hash 粘性</text>

    <!-- Static assets -->
    <rect class="node neutral" x="780" y="173" width="210" height="40" rx="6" />
    <text class="label" x="885" y="190" text-anchor="middle">静态资源</text>
    <text class="small" x="885" y="204" text-anchor="middle">/assets/* → dist/</text>

    <!-- ===== Application Layer ===== -->

    <!-- Express App -->
    <rect class="node process" x="370" y="288" width="400" height="52" rx="6" />
    <text class="label" x="570" y="308" text-anchor="middle">Express 4.x + Socket.IO 4 (Node.js 20 LTS)</text>
    <text class="small" x="570" y="326" text-anchor="middle">auth 中间件 · voteRouter · wsHandler · TallySync</text>

    <!-- Services row -->
    <rect class="node input" x="60" y="360" width="185" height="48" rx="6" />
    <text class="label" x="152" y="379" text-anchor="middle">VoteService</text>
    <text class="small" x="152" y="395" text-anchor="middle">创建·查询·结束·列表</text>

    <rect class="node input" x="260" y="360" width="185" height="48" rx="6" />
    <text class="label" x="352" y="379" text-anchor="middle">BallotService</text>
    <text class="small" x="352" y="395" text-anchor="middle">提交·防重·计数·校验</text>

    <rect class="node input" x="460" y="360" width="185" height="48" rx="6" />
    <text class="label" x="552" y="379" text-anchor="middle">DeadlineWorker</text>
    <text class="small" x="552" y="395" text-anchor="middle">Keyspace 监听 + 兜底扫描</text>

    <rect class="node input" x="660" y="360" width="185" height="48" rx="6" />
    <text class="label" x="752" y="379" text-anchor="middle">RateLimiter</text>
    <text class="small" x="752" y="395" text-anchor="middle">滑动窗口 + 降级兜底</text>

    <rect class="node input" x="860" y="360" width="140" height="48" rx="6" />
    <text class="label" x="930" y="379" text-anchor="middle">RedisHealth</text>
    <text class="small" x="930" y="395" text-anchor="middle">PING 监控·降级</text>

    <!-- Knex + Redis Adapter -->
    <rect class="node neutral" x="80" y="425" width="185" height="36" rx="6" />
    <text class="small" x="172" y="447" text-anchor="middle">Knex.js 3.x (PG 连接池 2-20)</text>

    <rect class="node neutral" x="280" y="425" width="185" height="36" rx="6" />
    <text class="small" x="372" y="447" text-anchor="middle">Socket.IO Redis Adapter</text>

    <rect class="node neutral" x="480" y="425" width="185" height="36" rx="6" />
    <text class="small" x="572" y="447" text-anchor="middle">TallySync (5s 对账)</text>

    <!-- WS rooms representation -->
    <rect class="node process" x="700" y="425" width="290" height="36" rx="6" />
    <text class="small" x="845" y="447" text-anchor="middle">WS 房间: vote:{id}  · 事件: update / closed / reminder</text>

    <!-- Middleware bar -->
    <rect class="node neutral" x="520" y="475" width="155" height="30" rx="6" />
    <text class="tiny" x="597" y="494" text-anchor="middle">认证 · 限流 · 校验 · 错误处理</text>

    <!-- ===== Data Layer ===== -->

    <!-- PostgreSQL -->
    <rect class="node storage" x="150" y="598" width="360" height="72" rx="6" />
    <text class="label" x="330" y="618" text-anchor="middle">PostgreSQL 15</text>
    <text class="small" x="330" y="637" text-anchor="middle">votes · options · user_votes</text>
    <text class="tiny" x="330" y="655" text-anchor="middle">UNIQUE(vote_id, user_id) 防重 · FOR UPDATE 行锁</text>

    <!-- Redis -->
    <rect class="node external" x="580" y="598" width="380" height="72" rx="6" />
    <text class="label" x="770" y="618" text-anchor="middle">Redis 7</text>
    <text class="small" x="770" y="637" text-anchor="middle">vote:{id}:tally (Hash) · vote:{id}:deadline (TTL) · rate:{uid}:{vid} (ZSet)</text>
    <text class="tiny" x="770" y="655" text-anchor="middle">notify-keyspace-events Ex · 降级标志 health:degraded</text>

    <!-- ===== Protocol labels ===== -->

    <!-- HTTPS labels -->
    <text class="tiny" x="160" y="140" text-anchor="middle">HTTPS (REST)</text>
    <text class="tiny" x="340" y="140" text-anchor="middle">WSS (Socket.IO)</text>

    <!-- Internal labels -->
    <text class="tiny" x="360" y="585" text-anchor="middle">Knex SQL</text>
    <text class="tiny" x="810" y="585" text-anchor="middle">ioredis</text>

    <!-- ===== Legend ===== -->
    <rect class="node client" x="60" y="740" width="14" height="14" rx="3" />
    <text class="tiny" x="80" y="752">客户端</text>
    <rect class="node gateway" x="130" y="740" width="14" height="14" rx="3" />
    <text class="tiny" x="150" y="752">接入层</text>
    <rect class="node process" x="200" y="740" width="14" height="14" rx="3" />
    <text class="tiny" x="220" y="752">应用</text>
    <rect class="node input" x="262" y="740" width="14" height="14" rx="3" />
    <text class="tiny" x="282" y="752">服务</text>
    <rect class="node storage" x="320" y="740" width="14" height="14" rx="3" />
    <text class="tiny" x="340" y="752">持久化</text>
    <rect class="node external" x="390" y="740" width="14" height="14" rx="3" />
    <text class="tiny" x="410" y="752">缓存</text>

  </svg>
</main>
